name: revenue_decline
description: >
  Detects accounts whose T12M billed revenue has declined more than 15%
  vs. their prior 12-month baseline. Combines BigQuery invoice data with
  Salesforce opportunity context. Critical declines always escalate to human CSMs.
source: bigquery + salesforce
measurement:
  current: SUM(revenue) WHERE invoice_date >= today - 365   # T12M
  previous: SUM(revenue) WHERE invoice_date BETWEEN today - 730 AND today - 365   # P12M
  trigger_threshold_pct: 10   # T12M < 90% of P12M; spec lists tiers starting at 10%

urgency_tiers:
  early_warning:
    decline_range_pct: [10, 20]
    recommended_action: enroll_hubspot_sequence
    sequence: churn-intervention-revenue
    human_escalation: false
  active_risk:
    decline_range_pct: [20, 35]
    recommended_action: enroll_hubspot_sequence
    sequence: churn-intervention-revenue
    human_escalation: false
  critical:
    decline_range_pct_min: 35
    recommended_action: escalate_to_csm
    sequence: churn-intervention-revenue
    human_escalation: true

salesforce_action: create_csm_task_update_opportunity_stage

personalization:
  - field: pct_decline
    source: signal_payload
    transform: format_as_percentage
  - field: arr
    source: salesforce
  - field: contract_renewal_date
    source: salesforce
  - field: csm_owner
    source: salesforce

cooldown_days: 30
