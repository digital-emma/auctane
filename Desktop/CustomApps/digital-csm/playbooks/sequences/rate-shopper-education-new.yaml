sequence_name: rate-shopper-education-new
signal: rate_shopper_not_adopted
trigger_mode: onboarding
persona: Atlas
sender_name: Atlas
sender_title: Customer Success, ShipStation
unenroll_trigger: customer_reply
unenroll_on_feature_activated: true
escalation_trigger: none
cadence_days: [0, 7, 14]

personalization_variables:
  - first_name
  - account_name
  - monthly_order_volume
  - primary_carrier
  - estimated_savings
  - current_plan
  - current_plan_cost
  - standard_plan_cost
  - price_difference
  - video_link

emails:
  - day: 0
    subject: "{account_name} — your personalized ShipStation account audit"
    body: |
      Hi {first_name},

      My name is Atlas, and I've recently been assigned to support
      your account here at ShipStation.

      To get started, I conducted an audit of your account and
      noticed that Rate Shopper isn't currently enabled. Based on
      your shipping volume of {monthly_order_volume} orders per
      month, and looking at similar businesses in your industry,
      I ran an analysis that's showing a meaningful savings
      opportunity we haven't unlocked for you yet.

      Businesses similar to yours shipping with {primary_carrier}
      at your volume are seeing an average of {estimated_savings}%
      reduction in carrier costs once their account is fully
      optimized. I wanted to give you those same results.

      Based on my audit, here are the three steps I recommend to
      get your workflow fully optimized — so you can ship faster
      and save money at the same time:

      Step 1 — Enable Rate Shopper
      Rate Shopper automatically compares your carrier rates on
      every order and selects the best option based on rules you
      define once. You can turn it on here:
      https://ship14.shipstation.com/settings/rateShopper

      Step 2 — Connect your walleted carriers
      Connecting your negotiated carrier accounts lets Rate Shopper
      compare your contracted rates alongside ShipStation's
      pre-negotiated rates — so every shipment gets the best
      available price, not just the default. Add your carriers here:
      https://ship14.shipstation.com/settings/carriers

      Step 3 — Set your first automation rule
      Once Rate Shopper is running, one automation rule will
      eliminate your most repetitive manual routing decisions
      permanently — freeing up time on every order you process.
      Set up your first rule here:
      https://ship14.shipstation.com/automations

      I've also attached a quick walkthrough video showing exactly
      how to complete each of these steps on an account like yours.
      {video_link}

      If you have any questions or want me to walk through anything
      specific to your setup, just reply here — I'm happy to help.

      Atlas
      Customer Success, ShipStation
    personalization_variables:
      - first_name
      - account_name
      - monthly_order_volume
      - primary_carrier
      - estimated_savings
      - video_link

  - day: 7
    subject: "{first_name} — following up on your account audit"
    body: |
      Hi {first_name},

      I wanted to follow up on the recommendations I shared last
      week from your ShipStation account audit.

      I noticed the three steps I outlined haven't been completed
      yet — which means your account is still leaving
      {estimated_savings}% in potential carrier savings on the
      table each month.

      Just to recap what I recommended:

      Step 1 — Enable Rate Shopper
      https://ship14.shipstation.com/settings/rateShopper

      Step 2 — Connect your walleted carriers
      https://ship14.shipstation.com/settings/carriers

      Step 3 — Set your first automation rule
      https://ship14.shipstation.com/automations

      I know these things can get buried — if it would help,
      I can walk you through any of the steps directly. Just
      reply here and let me know which part you'd like help
      with and I'll take it from there.

      The walkthrough video I sent last week is still attached
      if that's easier: {video_link}

      Atlas
      Customer Success, ShipStation
    personalization_variables:
      - first_name
      - estimated_savings
      - video_link

  - day: 14
    subject: "Last note from your ShipStation account review — {account_name}"
    body: |
      Hi {first_name},

      This is my last follow-up on the audit recommendations
      I shared two weeks ago.

      I don't want to keep reaching out if the timing isn't
      right — but I do want to make sure these opportunities
      don't go unnoticed permanently.

      To summarize what's still available for your account:

      — Rate Shopper isn't enabled, meaning every carrier
        decision is still happening manually on each of your
        {monthly_order_volume} monthly orders

      — Your walleted carriers aren't connected, so Rate
        Shopper won't be able to compare your negotiated
        rates when you do turn it on

      — No automation rules are set up, meaning your most
        repetitive routing decisions are still manual

      Based on accounts similar to yours, completing all
      three steps typically unlocks {estimated_savings}% in
      carrier cost savings within the first 30 days.

      When you're ready:

      Enable Rate Shopper →
      https://ship14.shipstation.com/settings/rateShopper

      Connect walleted carriers →
      https://ship14.shipstation.com/settings/carriers

      Set your first automation rule →
      https://ship14.shipstation.com/automations

      And if you ever want me to take another look at your
      account or walk through the setup, just reply — I'm
      here.

      Atlas
      Customer Success, ShipStation
    personalization_variables:
      - first_name
      - account_name
      - monthly_order_volume
      - estimated_savings
